attack_mapping:
- tactic: Reconnaissance
  technique: T1595 - Active Scanning
  confidence: Medium
  assessment: Attackers likely enumerated exposed ServiceNow tenants and tested the
    target API path across instances.
- tactic: Initial Access
  technique: T1190 - Exploit Public-Facing Application
  confidence: High
  assessment: The exposed REST endpoint functioned as an internet-reachable application
    surface that could be queried without valid authentication.
- tactic: Collection
  technique: T1213 - Data from Information Repositories
  confidence: High
  assessment: Vendor-confirmed successful table queries indicate collection from business-data
    repositories hosted inside customer instances.
- tactic: Credential Access
  technique: T1552 - Unsecured Credentials
  confidence: Medium
  assessment: If tickets or attachments contained passwords, API keys, or troubleshooting
    secrets, exposed records could directly yield usable credentials.
- tactic: Exfiltration
  technique: T1041 - Exfiltration Over C2 Channel
  confidence: Low
  assessment: Successful data querying is vendor-confirmed, but publicly available
    evidence does not yet prove broad downstream exfiltration volume or destination.
